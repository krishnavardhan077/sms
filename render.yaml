services:
  # ── Backend (FastAPI) ─────────────────────────────────────────────
  - type: web
    name: sms-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      # Automatically injected from the Render PostgreSQL below
      - key: DATABASE_URL
        fromDatabase:
          name: sms-postgres
          property: connectionString
      # Update this to your deployed frontend URL after first deploy
      - key: CORS_ORIGINS
        value: "*"

# ── PostgreSQL Database ─────────────────────────────────────────────
databases:
  - name: sms-postgres
    databaseName: studentdb
    plan: free
